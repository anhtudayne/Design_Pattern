server.error.include-message=always
spring.application.name=film-booking-backend
spring.config.import=optional:file:./.env[.properties]

# ===============================
# DATABASE CONNECTION (MySQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Hiển thị lệnh SQL trên cửa sổ Terminal để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ddl-auto=update: Spring Boot sẽ tự kiểm tra mô hình Java (22 file entities) có khớp với MySQL chưa.
# Vì chúng ta đã tự chạy Script CSDL nên để update là an toàn nhất.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# ENCODING (UTF-8)
# ===============================
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8

# ===============================
# FRONTEND URL (for CORS)
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ===============================
server.port=8080

# ===============================
# JWT SECURITY
# ===============================
cinema.app.jwtSecret=${JWT_SECRET:StarCineSecretKeyVerySecure1234567890}
cinema.app.jwtExpirationMs=86400000

# ===============================
# CLOUDINARY CONFIG (IMAGE UPLOAD)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
cinema.app.redisTtlSeconds=${REDIS_TTL_SECONDS:600}

# ===============================
# MOMO PAYMENT CONFIG
# ===============================
momo.endpoint=${DEV_MOMO_ENDPOINT}
momo.access-key=${DEV_ACCESS_KEY}
momo.partner-code=${DEV_PARTNER_CODE}
momo.secret-key=${DEV_SECRET_KEY}
momo.redirect-url=${MOMO_RETURN_URL}
momo.ipn-url=${MOMO_NOTIFY_URL}
momo.dev-all-success=${MOMO_DEV_PAYMENT_OPTION_ALL_PAYMENT_SUCCESS:false}

# ===============================
# DYNAMIC PRICING CONFIG
# ===============================
cinema.pricing.weekend-surcharge-pct=15
cinema.pricing.holiday-surcharge-pct=20
cinema.pricing.early-bird-discount-pct=10
cinema.pricing.early-bird-days=3
cinema.pricing.occupancy-threshold-pct=80
cinema.pricing.occupancy-surcharge-pct=10

# ===============================
# MAIL CONFIG (E-TICKET)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=starcine.cinema@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
