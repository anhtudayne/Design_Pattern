spring.web.error.include-message=always
spring.application.name=film-booking-backend
# .env: ưu tiên ../.env (root repo khi mvn chạy từ backend/), sau đó ./.env (backend/.env)
spring.config.import=optional:file:../.env[.properties],optional:file:./.env[.properties]

# ===============================
# DATABASE CONNECTION (MySQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/starcine?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Hiển thị lệnh SQL trên cửa sổ Terminal để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ddl-auto=update: Spring Boot sẽ tự kiểm tra mô hình Java (22 file entities) có khớp với MySQL chưa.
# Vì chúng ta đã tự chạy Script CSDL nên để update là an toàn nhất.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:normalized_db.sql,classpath:data.sql

# ===============================
# ENCODING (UTF-8)
# ===============================
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8

# ===============================
# FRONTEND URL (for CORS)
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ===============================
server.port=8080

# ===============================
# JWT SECURITY
# ===============================
cinema.app.jwtSecret=${JWT_SECRET:StarCineSecretKeyVerySecure1234567890}
cinema.app.jwtExpirationMs=86400000

# ===============================
# CLOUDINARY CONFIG (IMAGE UPLOAD)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# ===============================
# REDIS CONFIGURATION
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
cinema.app.redisTtlSeconds=${REDIS_TTL_SECONDS:600}

# ===============================
# MOMO PAYMENT CONFIG
# Biến MoMo (sandbox) — tham chiếu repo MoMo:
# https://github.com/momo-wallet/java/blob/master/src/main/resources/environment.properties
# ===============================
momo.endpoint=${DEV_MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
momo.access-key=${DEV_ACCESS_KEY:mTCKt9W3eU1m39TW}
momo.partner-code=${DEV_PARTNER_CODE:MOMOLRJZ20181206}
momo.secret-key=${DEV_SECRET_KEY:SetA5RDnLHvt51AULf51DyauxUo3kDU6}
momo.redirect-url=${MOMO_RETURN_URL:http://localhost:8080/api/payment/momo/callback}
momo.ipn-url=${MOMO_NOTIFY_URL:http://localhost:8080/api/payment/momo/webhook}
momo.dev-all-success=${MOMO_DEV_PAYMENT_OPTION_ALL_PAYMENT_SUCCESS:false}
# true = không POST ra MoMo (payUrl giả about:blank#...). Mặc định false = gọi sandbox (credential default ở trên). Nếu 403/IP chưa whitelist: MOMO_DEV_SKIP_EXTERNAL=true trong .env.
momo.dev-skip-external=${MOMO_DEV_SKIP_EXTERNAL:false}

# ===============================
# VNPAY — bật khi có merchant sandbox / production & ký hash đầy đủ trong VnPayServiceImpl
# ===============================
vnpay.enabled=false
vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.return-url=${app.frontend-url}/profile/transactions

# ===============================
# DYNAMIC PRICING CONFIG
# ===============================
cinema.pricing.weekend-surcharge-pct=15
cinema.pricing.holiday-surcharge-pct=20
cinema.pricing.early-bird-discount-pct=10
cinema.pricing.early-bird-days=3
cinema.pricing.occupancy-threshold-pct=80
cinema.pricing.occupancy-surcharge-pct=10

# ===============================
# MAIL CONFIG (E-TICKET)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=starcine.cinema@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
